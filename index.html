<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cp">
        <div class="cp1">
            <div class="inf">
                <img src="g1.jpg" alt="Google Logo"></img>
                <p id="sign-in">Sign in</p>
                <p id="use-account">Use your Google Account</p>
            </div>
            <div class="inp">
                <input type="email" id="email" placeholder="Email or phone">
                <a href="#">Forgot email?</a>
            </div>
            <div class="st">
                <p id="guest-mode">Not your computer? Use Guest mode to sign in privately.<a href="#">Learn more</a></p>
            </div>
            <div class="bt">
                <button id="next">Next</button>
                <a id="create" href="#">Create account</a>
            </div>
        </div>
        <div class="cp2">
            <div class="sl">
                <select id="language">
                    <option value="en">English (United States)</option>
                    <option value="es">Español (España)</option>
                    <option value="fr">Français (France)</option>
                    <option value="de">Deutsch (Deutschland)</option>
                    <option value="zh">中文(中国)</option>
                </select>
            </div>
            <div class="ft">
                <a href="#">Help</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
